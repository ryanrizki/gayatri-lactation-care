services:
  db:
    image: postgres:16
    container_name: gayatri-lactation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gayatri
      POSTGRES_PASSWORD: gayatri_dev
      POSTGRES_DB: gayatri
    ports:
      - "5435:5432"
    volumes:
      - gayatri_pgdata:/var/lib/postgresql/data

volumes:
  gayatri_pgdata:
